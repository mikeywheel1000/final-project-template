openapi: 3.0.3
info:
  title: Blog Api
  version: 1.0.0
  description: API documentation for the Blog API
servers:
  - url: http://localhost:3000/api
    description: local testing environment
  - url: https://final-project-service-i270.onrender.com/api
    description: Production server

tags:
  - name: cards
    description: Operations related to SWU cards
  - name: auth
    description: User authentication endpoints
  - name: leaders
    description: Operations related to SWU leaders

paths: 
  /card: 
    get: 
      tags:
        - cards
      summary: Get All cards
      description: Retrieves a list of all SWU cards.
      parameters: 
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/offset"
        - $ref: "#/components/parameters/limit"
      responses:
        '200':
          description: A list of cards
          content: 
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Card'
    post:
      security: 
        - bearerAuth: []
      tags:
        - cards
      summary: Create a new card
      description: create a new SWU card
      requestBody:
        description: The card object to create
        required: true
        content:
          application/json:
            schema:
              $ref : "#/components/schemas/Card"
      responses:
        '201': 
          description: Card successfully created
          content: 
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
        '400': 
          $ref : "#/components/responses/InvalidCardInput"
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403': 
          $ref: "#/components/responses/Forbidden"

  /card/{id}:
    get:
      tags:
        - cards
      summary: Gets a card by id
      description: Retrieves a single SWU card by it's id
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        '200': 
          description: A single SWU card
          content: 
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
      
        '404': 
          $ref: "#/components/responses/NotFound"

        '400': 
          $ref: "#/components/responses/InvalidID"
    put: 
      security: 
        - bearerAuth: []
      tags:
        - cards
      summary: updates a card by id
      description: Updates a single SWU card by it's id
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        description: The new card to update with
        required: true
        content:
          application/json:
            schema:
              $ref : "#/components/schemas/Card"
      responses:
        '200': 
          description: Card successfully updated
          content: 
            application/json:
              schema:
                $ref: "#/components/schemas/Card"
        '400': 
            description: Bad request due to invalid data or Id
            content: 
              application/json:
                schema:  
                  type: object
                  properties:
                    errors:
                      type: array
                      items: 
                        type: string
                  example: 
                    errors: 
                      - "Name must be at least 3 characters"
                      - "Cost must be a positive integer"
                      - "Stats must be a string"
                      - "Stats must be in format: attack/health, where attack and health are numbers"
                      - "Traits must be a string"
                      - "type must be one of EVENT, UNIT, UPGRADE"
                      - "Text must be at least 10 characters"
                      - "aspects must be one or more of the following: Aggression, Vigilance, Cunning, Command, Heroism, Villainy"
                      - "Id must be an integer"
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403': 
          $ref: "#/components/responses/Forbidden"
        '404': 
          $ref: "#/components/responses/NotFound"
    delete:
      security: 
        - bearerAuth: []
      tags:
        - cards
      summary: Deletes a card by id
      description: Deletes a single SWU card by it's id
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        '204': 
          description: Card deleted successfully
      
        '404': 
          $ref: "#/components/responses/NotFound"

        '400': 
          $ref: "#/components/responses/InvalidID"
        '401': 
          $ref: "#/components/responses/Unauthorized"
        '403': 
          $ref: "#/components/responses/Forbidden"
  /deck: 
    get: 
      tags:
        - decks
      summary: Get All decks
      description: Retrieves a list of all SWU decks.
      parameters: 
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/sortBy"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/offset"
        - $ref: "#/components/parameters/limit"
      responses:
        '200':
          description: A list of decks
          content: 
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Deck'
    post:
      security: 
        - bearerAuth: []
      tags:
        - decks
      summary: Create a new deck
      description: create a new SWU deck
      requestBody:
        description: The deck object to create
        required: true
        content:
          application/json:
            schema:
              $ref : "#/components/schemas/Deck"
      responses:
        '201': 
          description: Deck successfully created
          content: 
            application/json:
              schema:
                $ref: "#/components/schemas/Deck"
        '400': 
          $ref : "#/components/responses/InvalidDeckInput"
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403': 
          $ref: "#/components/responses/Forbidden"

