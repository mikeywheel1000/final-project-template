        '404': 
          $ref: "#/components/responses/NotFound"

        '400': 
          $ref: "#/components/responses/InvalidID"
        '401': 
          $ref: "#/components/responses/Unauthorized"
        '403': 
          $ref: "#/components/responses/Forbidden"
  /deck/add/{id}:
    put: 
      security: 
        - bearerAuth: []
      tags:
        - decks
      summary: adds cards to the decklist
      description: Adds cards to a single SWU deck by it's id
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        description: the list of cards to add
        required: true
        content:
          application/json:
            schema:
              $ref : "#/components/schemas/Decklist"
      responses:
        '200': 
          description: Deck successfully updated
          content: 
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Card"
        '400': 
            description: Bad request due to invalid data or Id
            content: 
              application/json:
                schema:  
                  type: object
                  properties:
                    errors:
                      type: array
                      items: 
                        type: string
                  example: 
                    errors: 
                      - "One or more cards not found. Send me an email, and let me know what's missing!"
                      - "Deck # not found"
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403': 
          $ref: "#/components/responses/Forbidden"
        '404': 
          $ref: "#/components/responses/NotFound"
  /deck/remove/{id}:
    put: 
      security: 
        - bearerAuth: []
      tags:
        - decks
      summary: removes cards from the decklist
      description: removes cards from a single SWU deck by it's id
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        description: the list of cards to add
        required: true
        content:
          application/json:
            schema:
              $ref : "#/components/schemas/Decklist"
      responses:
        '200': 
          description: Deck successfully updated
          content: 
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Card"
        '400': 
            description: Bad request due to invalid data or Id
            content: 
              application/json:
                schema:  
                  type: object
                  properties:
                    errors:
                      type: array
                      items: 
                        type: string
                  example: 
                    errors: 
                      - "One or more cards not found. Send me an email, and let me know what's missing!"
                      - "Deck # not found"
        '401':
          $ref: "#/components/responses/Unauthorized"
        '403': 
          $ref: "#/components/responses/Forbidden"
        '404': 
          $ref: "#/components/responses/NotFound"
